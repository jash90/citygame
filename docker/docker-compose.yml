services:
  postgres:
    image: postgres:16-alpine
    container_name: citygame-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: citygame
      POSTGRES_PASSWORD: citygame_dev
      POSTGRES_DB: citygame
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citygame"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: citygame-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: run backend in Docker for full-stack local dev
  # Usage: docker compose --profile backend up
  backend:
    profiles: ["backend"]
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: citygame-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://citygame:citygame_dev@postgres:5432/citygame
      REDIS_URL: redis://redis:6379
      # ⚠️ DEVELOPMENT ONLY — change all secrets in production (min 32 chars)
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
