name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && npx prisma generate

      - name: Typecheck
        run: pnpm turbo run typecheck

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: citygame
          POSTGRES_PASSWORD: citygame_test
          POSTGRES_DB: citygame_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && npx prisma generate

      - name: Build shared package
        run: cd packages/shared && pnpm run build

      - name: Run backend tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://citygame:citygame_test@localhost:5432/citygame_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
          ANTHROPIC_API_KEY: sk-ant-test-key
        run: pnpm run test -- --coverage --passWithNoTests

  test-shared:
    name: Shared Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run shared tests
        working-directory: packages/shared
        run: pnpm run test -- --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && npx prisma generate

      - name: Build all packages
        run: pnpm turbo run build

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: citygame
          POSTGRES_PASSWORD: citygame_test
          POSTGRES_DB: citygame_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && npx prisma generate

      - name: Run Prisma Migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://citygame:citygame_test@localhost:5432/citygame_test
        run: npx prisma migrate deploy

      - name: Build shared package
        run: cd packages/shared && pnpm run build

      - name: Run E2E tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://citygame:citygame_test@localhost:5432/citygame_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
          ANTHROPIC_API_KEY: sk-ant-test-key
          R2_ENDPOINT: https://test.r2.cloudflarestorage.com
          R2_ACCESS_KEY: test-key
          R2_SECRET_KEY: test-secret
          R2_BUCKET: test-bucket
          CORS_ORIGIN: http://localhost:3000
        run: pnpm run test:e2e

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f apps/backend/Dockerfile -t citygame-backend:test .
